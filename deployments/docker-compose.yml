services:
  app:
    build:
      context: ..
      dockerfile: deployments/Dockerfile
    env_file:
      - ../.env
    ports:
      - "8080:8080"
    networks:
      - webnet
  redis:
    image: redis:alpine
    container_name: url-shortener-redis
    ports:
      - "6379:6379"
    networks:
      - webnet
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - app
    networks:
      - webnet

networks:
  webnet: